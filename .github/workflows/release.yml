name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Build release archive
        run: |
          mkdir -p dist
          zip -r "dist/ha-dashboard-scaler.zip" \
            README.md LICENSE hacs.json package.json \
            www themes dashboard_templates

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ha-dashboard-scaler.zip
          generate_release_notes: true
